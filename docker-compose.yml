services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spendlabel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # schema first, then seed (initdb runs scripts in alphabetical order).
      - ./services/kafka-consumers/app/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./services/kafka-consumers/app/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spendlabel"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # INTERNAL (kafka:19092) for in-network services; EXTERNAL (localhost:9092)
      # so host tools like services/producer can reach the broker.
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    # Start the broker, wait until it answers, then create the 8 topics.
    command:
      - bash
      - -c
      - |
        /etc/confluent/docker/run &
        until kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1; do
          echo "waiting for kafka..."; sleep 1;
        done
        for t in cpv-raw cpv-hardcoded cpv-sparkml cpv-deeplearning cpv-solver cpv-langchain cpv-n8n cpv-mcp; do
          kafka-topics --bootstrap-server localhost:9092 --create --if-not-exists \
            --topic "$$t" --partitions 1 --replication-factor 1
        done
        wait
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 12

  consumers:
    build: ./services/kafka-consumers/app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: spendlabel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # Placeholder stub: reads cpv-raw, logs received ocids, writes nothing.
    command: ["python", "main.py", "--paradigm", "hardcoded"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  ui-chart:
    build: ./services/ui-chart/app
    env_file:
      - .env.docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
